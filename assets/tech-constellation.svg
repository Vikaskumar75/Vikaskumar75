<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 290" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Tech constellation: Flutter, Dart, Firebase, NestJS, Node.js, TypeScript">
  <defs>
    <linearGradient id="primaryBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f77dd" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7f77dd" stop-opacity="0.04"/>
    </linearGradient>
    <style>
      .card        { fill: #161b22; stroke: #21262d; stroke-width: 0.8; }
      .card-prim   { fill: url(#primaryBg); stroke: #7f77dd; stroke-width: 1.2; stroke-opacity: 0.45; }
      .label       { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 600; fill: #e6edf3; letter-spacing: -0.3px; }
      .label-prim  { fill: #ffffff; }
      .ts-letters  { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 800; font-size: 11px; fill: #0d1117; }
    </style>
  </defs>

  <!-- ROW 1 -->

  <!-- Card 1: Flutter (primary) -->
  <rect x="10" y="10" width="386" height="130" rx="12" class="card-prim">
    <animate attributeName="stroke-opacity" values="0.35;0.75;0.35" dur="3.6s" repeatCount="indefinite"/>
  </rect>
  <g transform="translate(184 32) scale(1.6)">
    <path d="M14 3L7 14h4.5v11L21 14h-4.5V3z" fill="#7f77dd" opacity="0.95"/>
  </g>
  <text x="203" y="115" text-anchor="middle" class="label label-prim">Flutter</text>

  <!-- Card 2: Dart -->
  <rect x="407" y="10" width="386" height="130" rx="12" class="card"/>
  <g transform="translate(581 32) scale(1.6)">
    <path d="M14 4a10 10 0 100 20 10 10 0 000-20zm0 3a7 7 0 110 14 7 7 0 010-14z" fill="#58a6ff" opacity="0.75"/>
    <circle cx="14" cy="14" r="3" fill="#58a6ff"/>
  </g>
  <text x="600" y="115" text-anchor="middle" class="label">Dart</text>

  <!-- Card 3: Firebase -->
  <rect x="804" y="10" width="386" height="130" rx="12" class="card"/>
  <g transform="translate(978 32) scale(1.6)">
    <path d="M6 22V10l8-6 8 6v12l-8 3z" fill="none" stroke="#f78166" stroke-width="1.6"/>
    <path d="M14 4v21" stroke="#f78166" stroke-width="0.6" opacity="0.45"/>
  </g>
  <text x="997" y="115" text-anchor="middle" class="label">Firebase</text>

  <!-- ROW 2 -->

  <!-- Card 4: NestJS -->
  <rect x="10" y="151" width="386" height="130" rx="12" class="card"/>
  <g transform="translate(184 173) scale(1.6)">
    <path d="M14 5 L23 21 L5 21 Z" fill="none" stroke="#f78166" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M14 11 L19 20 L9 20 Z" fill="#f78166" opacity="0.45"/>
  </g>
  <text x="203" y="256" text-anchor="middle" class="label">NestJS</text>

  <!-- Card 5: Node.js -->
  <rect x="407" y="151" width="386" height="130" rx="12" class="card"/>
  <g transform="translate(581 173) scale(1.6)">
    <path d="M14 4 L22 9 L22 19 L14 24 L6 19 L6 9 Z" fill="none" stroke="#3fb950" stroke-width="1.6" stroke-linejoin="round"/>
    <circle cx="14" cy="14" r="2.5" fill="#3fb950"/>
  </g>
  <text x="600" y="256" text-anchor="middle" class="label">Node.js</text>

  <!-- Card 6: TypeScript -->
  <rect x="804" y="151" width="386" height="130" rx="12" class="card"/>
  <g transform="translate(978 173) scale(1.6)">
    <rect x="4" y="4" width="20" height="20" rx="3" fill="#58a6ff"/>
    <text x="14" y="19" text-anchor="middle" class="ts-letters">TS</text>
  </g>
  <text x="997" y="256" text-anchor="middle" class="label">TypeScript</text>
</svg>
