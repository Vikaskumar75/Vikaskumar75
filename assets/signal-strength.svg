<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Signal strength: 6 Centres of Excellence, 5+ Years in Flutter, 10 Direct reports mentored">
  <defs>
    <radialGradient id="accentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7f77dd" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7f77dd" stop-opacity="0"/>
    </radialGradient>
    <style>
      .card       { fill: #161b22; stroke: #21262d; stroke-width: 0.8; }
      .card-acc   { fill: #161b22; stroke: #7f77dd; stroke-width: 1.2; stroke-opacity: 0.5; }
      .num        { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 64px; font-weight: 700; fill: #e6edf3; letter-spacing: -3px; }
      .num-acc    { fill: #afa9ec; }
      .lbl        { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 18px; fill: #8b949e; letter-spacing: 0.4px; }
    </style>
  </defs>

  <!-- Card 1: 2 · accent -->
  <rect x="10" y="10" width="386" height="140" rx="12" class="card-acc">
    <animate attributeName="stroke-opacity" values="0.35;0.75;0.35" dur="4.2s" repeatCount="indefinite"/>
  </rect>
  <circle cx="203" cy="68" r="70" fill="url(#accentGlow)"/>
  <text x="203" y="85" text-anchor="middle" class="num num-acc">2</text>
  <text x="203" y="120" text-anchor="middle" class="lbl">Open-source packages</text>

  <!-- Card 2: 5+ -->
  <rect x="407" y="10" width="386" height="140" rx="12" class="card"/>
  <text x="600" y="85" text-anchor="middle" class="num">5+</text>
  <text x="600" y="120" text-anchor="middle" class="lbl">Years in Flutter</text>

  <!-- Card 3: 10 -->
  <rect x="804" y="10" width="386" height="140" rx="12" class="card"/>
  <text x="997" y="85" text-anchor="middle" class="num">10</text>
  <text x="997" y="120" text-anchor="middle" class="lbl">Direct reports mentored</text>
</svg>
